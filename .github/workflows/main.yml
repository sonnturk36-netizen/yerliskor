name: Flutter APK ve AAB Derleme

on:
  push:
    branches:
      - main # Kodlarınızı 'main' dalına yüklediğinizde otomatik çalışır

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Java Kur
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Android Lisanslarını Kabul Et
        run: |
          mkdir -p ${ANDROID_HOME}/cmdline-tools/latest/bin
          yes | sdkmanager --licenses || true

      - name: Flutter Kur
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Bağımlılıkları Yükle
        run: flutter pub get

      - name: Google Play İçin AAB Üret
        run: flutter build appbundle --release

      - name: Test İçin APK Üret
        run: flutter build apk --release

      - name: Dosyaları Teslim Et (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: google-play-dosyalari
          path: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/app-release.apk
