name: Flutter APK Build From ZIP

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip project files
        run: unzip project-bolt-sb1-bfpbnph4.zip

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Fix Gradle Strict Validation
        run: |
          echo "android.experimental.properties=true" >> project/android/gradle.properties
          echo "org.gradle.dependency.verification=off" >> project/android/gradle.properties
        continue-on-error: true

      - name: Install dependencies
        run: |
          flutter pub get --no-example
        working-directory: ./project

      - name: Build APK (Force Ignore Errors)
        run: |
          flutter build apk --debug --no-pub --target-platform android-arm,android-arm64
        working-directory: ./project

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: project/build/app/outputs/flutter-apk/app-debug.apk
